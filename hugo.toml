baseURL = "https://jeanctr.github.io/website/" # ¡Asegúrate de que termine en /!
languageCode = "es-es"
title = "El Blog de Jean Carlos"
theme = "PaperMod"

[params]
    env = "production"
    title = "Mi Bitácora Digital"
    description = "Escribiendo sobre tecnología y vida por los próximos 10 años."
    author = "Tu Nombre"
    
    # Esto activa el botón de modo oscuro/claro que ves arriba
    defaultTheme = "auto" 
    
    # Para que las fotos se vean bien
    ShowCodeCopyButtons = true
    ShowReadingTime = true

    # Redes Sociales (aparecerán iconos automáticamente)
    [[params.socialIcons]]
        name = "twitter"
        url = "https://twitter.com/jeanctr"
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/jeanctr"